apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributedcounter-deployment
  labels:
    app: distributedcounter-app

spec:
  replicas: 3
  selector:
    matchLabels:
      app: distributedcounter-app
  template:
    metadata:
      labels:
        app: distributedcounter-app
    spec:
      containers:
        - name: distributedcounter
          image: bkoprucu/distributedcounter:0.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: service-port
            - containerPort: 5701
              name: hazelcast-port
          env:
            - name: spring_profiles_active
              value: kubernetes
          livenessProbe: # will restart if fails
            httpGet:
              port: service-port
              path: /actuator/health/liveness
            initialDelaySeconds: 50
            timeoutSeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              port: service-port
              path: /actuator/health/readiness
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 5
            failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: distributedcounter-service
  labels:
    app: distributedcounter-app
spec:
  type: LoadBalancer
  selector:
    app: distributedcounter-app
  ports:
    - port: 5701
      name: hazelcast
    - port: 8080
      name: service
      targetPort: 8080
